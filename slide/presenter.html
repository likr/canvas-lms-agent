<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スピーカー ダッシュボード - Canvas LMS MCP</title>
  <!-- Load Outfit Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <script type="module" src="https://unpkg.com/html-deck@1.0.0-alpha.2/dist/html-deck.js"></script>
  <script type="module" src="https://unpkg.com/html-deck@1.0.0-alpha.2/dist/html-deck-presenter.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #0f172a; /* Dark Slate 900 */
      color: #f8fafc; /* Slate 50 */
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }

    /* Header Bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8; /* Sky 400 */
    }

    .header-widgets {
      display: flex;
      align-items: center;
      gap: 30px;
      font-weight: 600;
    }

    hd-presenter-timer {
      --hd-presenter-timer-size: 24px;
      --hd-presenter-timer-color: #34d399; /* Emerald 400 */
      cursor: pointer;
    }

    hd-presenter-clock {
      --hd-presenter-clock-size: 24px;
      color: #94a3b8; /* Slate 400 */
    }

    hd-presenter-status {
      --hd-presenter-status-size: 20px;
      color: #f43f5e; /* Rose 500 */
    }

    /* Main Grid Layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      flex: 1;
      min-height: 0; /* Important for flex child scroll */
    }

    .panels-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .panel-preview-current {
      flex: 1.4;
      background: #020617; /* Slate 950 */
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 10px;
      min-height: 0;
    }

    .panel-preview-next {
      flex: 0.8;
      background: #020617;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 10px;
      min-height: 0;
    }

    .panel-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 5px;
      padding-left: 5px;
      font-weight: 700;
    }

    /* Fit elements inside preview panel */
    hd-presenter-preview {
      flex: 1;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
      display: block;
    }

    /* Right Panel (Notes & Controls) */
    .panel-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .panel-notes {
      flex: 1;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .notes-container {
      flex: 1;
      overflow-y: auto;
      font-size: 18px;
      line-height: 1.6;
      color: #cbd5e1; /* Slate 300 */
      padding-right: 5px;
    }

    /* Custom Scrollbar for Notes */
    .notes-container::-webkit-scrollbar {
      width: 6px;
    }
    .notes-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    .notes-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    hd-presenter-notes {
      --hd-presenter-notes-size: 18px;
      display: block;
    }

    /* Controls Panel */
    .panel-controls {
      background: rgba(30, 41, 59, 0.7);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    hd-presenter-controls {
      --hd-presenter-btn-bg: #3b82f6; /* Blue 500 */
      --hd-presenter-btn-hover-bg: #2563eb; /* Blue 600 */
      display: block;
      width: 100%;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">Canvas LMS MCP - Presentation</div>
    <div class="header-widgets">
      <hd-presenter-status></hd-presenter-status>
      <hd-presenter-timer title="Click to Reset"></hd-presenter-timer>
      <hd-presenter-clock></hd-presenter-clock>
    </div>
  </header>

  <div class="dashboard-grid">
    <div class="panels-left">
      <div class="panel-preview-current">
        <div class="panel-title">Current Slide</div>
        <hd-presenter-preview type="current"></hd-presenter-preview>
      </div>
      <div class="panel-preview-next">
        <div class="panel-title">Next Slide</div>
        <hd-presenter-preview type="next"></hd-presenter-preview>
      </div>
    </div>

    <div class="panel-right">
      <div class="panel-notes">
        <div class="panel-title">Speaker Notes</div>
        <div class="notes-container">
          <hd-presenter-notes></hd-presenter-notes>
        </div>
      </div>

      <div class="panel-controls">
        <hd-presenter-controls></hd-presenter-controls>
      </div>
    </div>
  </div>

</body>
</html>
